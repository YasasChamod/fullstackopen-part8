name: Test Chapter 4

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:5
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: cd tests-chapter4 && npm install
      
      - name: Run tests
        run: cd tests-chapter4 && npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/library-test
          NODE_ENV: test
          JWT_SECRET: test-secret
